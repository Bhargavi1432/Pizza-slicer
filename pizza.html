<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pizza Slider</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="slider">
  <button class="prev">&#10094;</button>

  <div class="slides">
    <img src="https://source.unsplash.com/800x500/?pizza" class="slide active">
    <img src="https://source.unsplash.com/800x500/?pepperoni-pizza" class="slide">
    <img src="https://source.unsplash.com/800x500/?cheese-pizza" class="slide">
    <img src="https://source.unsplash.com/800x500/?veg-pizza" class="slide">
  </div>

  <button class="next">&#10095;</button>
</div>

<script src="script.js"></script>
</body>
</html>
