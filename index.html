<!DOCTYPE html>
<html>
<head>
  <title>User App</title>
</head>
<body>

  <h2>Add / Edit User</h2>

  <input type="text" id="name" placeholder="Enter name"><br><br>
  <input type="number" id="age" placeholder="Enter age"><br><br>

  <button onclick="saveUser()">Save User</button>

  <h2>Users List</h2>
  <ul id="usersList"></ul>

  <script>
    let editId = null; // 🔥 track edit mode

    // 🔵 Get users
    async function getUsers() {
      const res = await fetch("http://localhost:3000/users");
      const data = await res.json();

      const list = document.getElementById("usersList");
      list.innerHTML = "";

      data.forEach(user => {
        const li = document.createElement("li");

        li.innerHTML = `
          ${user.name} (${user.age})
          <button onclick="editUser(${user.id}, '${user.name}', ${user.age})">✏️</button>
          <button onclick="deleteUser(${user.id})">❌</button>
        `;

        list.appendChild(li);
      });
    }

    // 🟢 Add OR Update user
    async function saveUser() {
      const name = document.getElementById("name").value;
      const age = document.getElementById("age").value;

      if (!name || !age) {
        alert("Fill all fields");
        return;
      }

      if (editId === null) {
        // ➕ CREATE
        await fetch("http://localhost:3000/users", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ name, age })
        });
      } else {
        // ✏️ UPDATE
        await fetch(`http://localhost:3000/users/${editId}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ name, age })
        });

        editId = null; // reset
      }

      // Clear inputs
      document.getElementById("name").value = "";
      document.getElementById("age").value = "";

      getUsers();
    }

    // ✏️ Fill form for editing
    function editUser(id, name, age) {
      document.getElementById("name").value = name;
      document.getElementById("age").value = age;

      editId = id;
    }

    // ❌ Delete user
    async function deleteUser(id) {
      await fetch(`http://localhost:3000/users/${id}`, {
        method: "DELETE"
      });

      getUsers();
    }

    // Load users on start
    window.onload = getUsers;
  </script>

</body>
</html>
